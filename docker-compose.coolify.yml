# Production-ready Docker Compose for Coolify deployment.
#
# IronClaw app + PostgreSQL with pgvector.
#
# Coolify usage:
#   1. Add a new resource → Docker Compose
#   2. Point to this file (docker-compose.coolify.yml)
#   3. Set required environment variables in Coolify UI
#   4. Deploy
#
# See deploy/coolify/README.md for the full step-by-step guide.

services:
  ironclaw:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Database — points to the companion postgres service.
      DATABASE_URL: postgres://ironclaw:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/ironclaw

      # LLM provider (default: NEAR AI).
      # Override LLM_BACKEND for other providers (openai, anthropic, ollama, etc.).
      LLM_BACKEND: ${LLM_BACKEND:-nearai}
      NEARAI_API_KEY: ${NEARAI_API_KEY:-}
      NEARAI_MODEL: ${NEARAI_MODEL:-claude-3-5-sonnet-20241022}
      NEARAI_BASE_URL: ${NEARAI_BASE_URL:-https://cloud-api.near.ai}
      NEARAI_SESSION_TOKEN: ${NEARAI_SESSION_TOKEN:-}

      # Anthropic direct (set LLM_BACKEND=anthropic).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}

      # OpenAI direct (set LLM_BACKEND=openai).
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

      # OpenAI-compatible (set LLM_BACKEND=openai_compatible).
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}

      # Agent
      AGENT_NAME: ${AGENT_NAME:-ironclaw}

      # Web Gateway
      GATEWAY_ENABLED: "true"
      GATEWAY_HOST: "0.0.0.0"
      GATEWAY_PORT: "3000"
      GATEWAY_AUTH_TOKEN: ${GATEWAY_AUTH_TOKEN:?Set GATEWAY_AUTH_TOKEN}

      # CLI disabled in container mode.
      CLI_ENABLED: "false"

      # Embeddings (optional — requires OPENAI_API_KEY or NEAR AI).
      EMBEDDING_ENABLED: ${EMBEDDING_ENABLED:-false}

      # Heartbeat (optional).
      HEARTBEAT_ENABLED: ${HEARTBEAT_ENABLED:-false}

      # Sandbox disabled by default (requires Docker-in-Docker).
      SANDBOX_ENABLED: "false"

      # Logging
      RUST_LOG: ${RUST_LOG:-ironclaw=info}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ironclaw
      POSTGRES_USER: ironclaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ironclaw"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
